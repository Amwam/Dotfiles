set -g allow-passthrough on
set-option -g set-titles on
set-option -g set-titles-string '#T'
set -g set-titles on
set -g set-titles-string '#T'

# ── Mouse support ─────────────────────────────────────────────────────────────
# Click windows in the status bar to switch, drag borders to resize,
# scroll with the mouse wheel inside panes.
set -g mouse on

# ── General UX ───────────────────────────────────────────────────────────────
set -g base-index 1          # number windows from 1 (easier to reach on keyboard)
set -g pane-base-index 1
set -g renumber-windows on   # keep window numbers contiguous when one is closed
set -g history-limit 10000
set -sg escape-time 10       # near-instant escape (default 500ms causes lag in vim/neovim)

# ── macOS / Ghostty ───────────────────────────────────────────────────────────
# True colour — tells tmux to pass 24-bit colour through to Ghostty
set -g default-terminal "tmux-256color"
# Extended keys — pass through modified keys (Shift+Enter, Ctrl+Arrow, etc.)
set -g extended-keys always
set -as terminal-features '*:extkeys'
set -as terminal-features ',xterm-ghostty:RGB'

# Clipboard — yank in copy mode / mouse selection goes to macOS clipboard
set -g set-clipboard on

# Focus events — lets neovim/vim know when the window gains or loses focus
set -g focus-events on

# ── Status bar position & refresh ────────────────────────────────────────────
set -g status on
set -g status-position top
set -g status-interval 5     # refresh every 5 seconds (for the clock)

# ── Pane navigation ──────────────────────────────────────────────────────────
# Move between panes with Ctrl-h/j/k/l (no prefix needed)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @tmux-which-key-xdg-enable 1
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'erikw/tmux-powerline'

run '~/.tmux/plugins/tpm/tpm'

