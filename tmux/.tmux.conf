set -g allow-passthrough on
set-option -g set-titles on
set-option -g set-titles-string '#T'
set -g set-titles on
set -g set-titles-string '#T'

# ── Mouse support ─────────────────────────────────────────────────────────────
# Click windows in the status bar to switch, drag borders to resize,
# scroll with the mouse wheel inside panes.
set -g mouse on

# ── General UX ───────────────────────────────────────────────────────────────
set -g base-index 1          # number windows from 1 (easier to reach on keyboard)
set -g pane-base-index 1
set -g renumber-windows on   # keep window numbers contiguous when one is closed
set -g history-limit 10000
set -sg escape-time 10       # near-instant escape (default 500ms causes lag in vim/neovim)

# ── macOS / Ghostty ───────────────────────────────────────────────────────────
# True colour — tells tmux to pass 24-bit colour through to Ghostty
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",ghostty:RGB"

# Extended keys — pass through modified keys (Shift+Enter, Ctrl+Arrow, etc.)
set -g extended-keys always
set -as terminal-features '*:extkeys'

# Clipboard — yank in copy mode / mouse selection goes to macOS clipboard
set -g set-clipboard on

# Focus events — lets neovim/vim know when the window gains or loses focus
set -g focus-events on

# ── Status bar position & refresh ────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5     # refresh every 5 seconds (for the clock)

# ── Colours ───────────────────────────────────────────────────────────────────
# Overall bar background
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# ── Left side: session name ───────────────────────────────────────────────────
# Shows which tmux session you are in
set -g status-left-length 30
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] Session: #S #[bg=#1e1e2e,fg=#89b4fa] "

# ── Right side: host + date/time ──────────────────────────────────────────────
set -g status-right-length 60
set -g status-right "#[fg=#a6e3a1] #h  #[fg=#f38ba8]%a %d %b  #[fg=#cdd6f4,bold]%H:%M "

# ── Window list (centre) ──────────────────────────────────────────────────────
set -g status-justify centre

# Inactive windows
set -g window-status-format " #I: #W "
set -g window-status-style "bg=#313244,fg=#cdd6f4"

# Active (current) window — stands out clearly
set -g window-status-current-format " #I: #W "
set -g window-status-current-style "bg=#cba6f7,fg=#1e1e2e,bold"

# Window with activity (e.g. new output while you're elsewhere)
set -g window-status-activity-style "bg=#f38ba8,fg=#1e1e2e,bold"

# ── Pane navigation ──────────────────────────────────────────────────────────
# Move between panes with Ctrl-h/j/k/l (no prefix needed)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

